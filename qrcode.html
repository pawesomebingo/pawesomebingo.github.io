<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <meta
            name="robots"
            content="noindex, nofollow" />
        <title>QR Code Generator</title>
        <link
            rel="icon"
            href="data:;base64,=" />
        <script
            defer
            src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "557899bdab3645b286aa7aaa60e96ff3"}'></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
        <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body
        class="flex flex-col lg:flex-row justify-center items-center gap-16 lg:gap-64 lg:min-h-screen py-16 lg:p-0">
        <div class="h-full flex flex-col justify-center items-center gap-4">
            <h1 class="text-6xl font-black -mb-2">STEP #1</h1>
            <h2 class="text-3xl text-center"
                >Insert URL and QR Code will<br />automatically be generated
                towards the right.</h2
            >
            <input
                id="text"
                class="p-2 w-[75%] min-h-0 border-3 border-[rgb(255,191,255)] focus:border-[rgb(255,71,255)] outline-hidden rounded-4xl"
                type="text"
                value="https://google.com"
                placeholder="https://google.com" />
        </div>
        <div class="h-full flex flex-col justify-center items-center gap-4">
            <h1 class="text-6xl font-black -mb-2">STEP #2</h1>
            <h2 class="text-center text-3xl">Download your QR code.</h2>
            <button
                class="bg-[rgb(255,191,255)] hover:bg-[rgb(255,206,255)] px-4 py-2 border-3 border-[rgb(255,191,255)] hover:border-[rgb(255,71,255)] rounded-tl-4xl rounded-tr-4xl rounded-bl-4xl rounded-br-4xl cursor-pointer font-black"
                onClick="downloadQRCode();"
                >DOWNLOAD</button
            >
            <div
                id="qrCode"
                class="mt-2 cursor-pointer"
                onClick="downloadQRCode();"></div>
        </div>
        <script>
            const qrCode = new QRCode('qrCode');
            const eText = document.getElementById('text');
            const eQRCode = document.querySelectorAll('#qrCode img')[0];

            function makeCode() {
                qrCode.makeCode(eText.value);
            }

            function downloadQRCode() {
                Object.assign(document.createElement('a'), {
                    href: eQRCode.src,
                    download: 'qrcode.png'
                }).click();
            }

            eText.addEventListener('blur', makeCode);
            eText.addEventListener('keydown', e =>
                e.key === 'Enter' ? makeCode() : null
            );

            makeCode();
        </script>
    </body>
</html>
